name: ci

on:
  push:
    branches:
      - '**'
    tags:
      - 'v*.*.*'
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - 'config.example.**'
      - '**.sh'
      - '**.json'
      - '**.yml'
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Review the code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Check
        run: cargo check

  build:
    name: Build the binary file
    runs-on: ubuntu-latest
    needs:
      - check
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build
        run: |
          docker run --rm \
            -v "$PWD:/workdir" \
            -v "$HOME/.cargo/git:/root/.cargo/git" \
            -v "$HOME/.cargo/registry:/root/.cargo/registry" \
            registry.gitlab.com/rust_musl_docker/image:stable-latest \
            sh -lc 'cd /workdir && cargo build --profile=fast -vv --target=x86_64-unknown-linux-musl'

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: biliroaming-rust-server-${{ github.ref_name }}-${{ github.run_number }}
          path: ./target/x86_64-unknown-linux-musl/fast/biliroaming_rust_server
          if-no-files-found: error
          retention-days: 30
